<!DOCTYPE html>
<html lang="id">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>JAGAME</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <main class="app">

        <div class="overlay"></div>

        <!-- Logo -->

        <section class="logo-area">

            <img
                src="assets/logo.png"
                alt="JAGAME"
                class="logo">

        </section>

        <!-- Tombol Start -->

        <section class="start-area">

            <button id="startBtn" class="start-btn">
    Mulai Petualangan →
</button>

        </section>

        <!-- Menu -->

        <section class="menu-area">

            <button id="coinBtn" class="menu-btn">

                <img
                    src="assets/gift.png"
                    alt="Gift">

                <span>Tukar Poin</span>

            </button>

            <button id="guideBtn" class="menu-btn">

                <img
                    src="assets/book.png"
                    alt="Book">

                <span>Panduan</span>

            </button>

        </section>

        <!-- Footer Coin -->

        <footer class="coin-footer">

            <img
                src="assets/coin.png"
                alt="Coin">

            <span>

                Kotagede Coin :

                <strong id="coinValue">

                    0

                </strong>

            </span>

        </footer>

    </main>

   <script type="module" src="script.js"></script>

</body>
</html>
